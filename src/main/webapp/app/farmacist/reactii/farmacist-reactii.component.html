<div class="container">
  <h2>Raportează reacție adversă (Farmacist)</h2>

  <form (ngSubmit)="trimite()">
    <div class="mb-3">
      <label class="form-label" for="pacientId">Pacient (ID)</label>
      <input
        id="pacientId"
        name="pacientId"
        type="number"
        class="form-control"
        [(ngModel)]="pacientId"
      />
    </div>

    <div class="mb-3">
      <label class="form-label" for="medicamentId">Medicament (ID, opțional)</label>
      <input
        id="medicamentId"
        name="medicamentId"
        type="number"
        class="form-control"
        [(ngModel)]="medicamentId"
      />
      <div class="form-text">
        Completează dacă știi ID-ul medicamentului suspect.
      </div>
    </div>

    <div class="mb-3">
      <label class="form-label" for="severitate">Severitate</label>
      <select
        id="severitate"
        name="severitate"
        class="form-select"
        [(ngModel)]="severitate"
      >
        <option value="MICA">Ușoară</option>
        <option value="MEDIE">Medie</option>
        <option value="SEVERA">Severă</option>
      </select>
    </div>

    <div class="mb-3">
      <label class="form-label" for="descriere">Descriere</label>
      <textarea
        id="descriere"
        name="descriere"
        class="form-control"
        rows="4"
        [(ngModel)]="descriere"
      ></textarea>
    </div>

    <div class="mb-3">
      <label class="form-label" for="evolutie">Evoluție (opțional)</label>
      <input
        id="evolutie"
        name="evolutie"
        type="text"
        class="form-control"
        [(ngModel)]="evolutie"
      />
    </div>

    <button type="submit" class="btn btn-primary" [disabled]="status === 'sending'">
      Trimite
    </button>
  </form>

  <div class="mt-3 alert alert-success" *ngIf="status === 'ok'">{{ mesaj }}</div>
  <div class="mt-3 alert alert-danger" *ngIf="status === 'error'">{{ mesaj }}</div>
</div>
